<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieSync — Дивимося разом</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--surface3:#22222e;
  --border:#2a2a3a;--text:#e8e8f0;--text2:#9898a8;--accent:#7c5cfc;
  --accent2:#a78bfa;--success:#22c55e;--chat-me:#7c5cfc;--chat-them:#2a2a3a;
  --radius:12px;--radius-sm:8px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input{font-family:inherit;outline:none;border:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===== LANDING ===== */
#landing{display:flex;align-items:center;justify-content:center;height:100vh;background:radial-gradient(ellipse at 50% 30%,#1a1a2e,var(--bg))}
.landing-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:420px;max-width:92vw;text-align:center;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.landing-card h1{font-size:28px;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.landing-card .subtitle{color:var(--text2);font-size:14px;margin-bottom:32px}
.landing-card .icon{font-size:48px;margin-bottom:16px;display:block}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:6px}
.field input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;transition:border-color .2s}
.field input:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#6a4ae8;transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);margin-top:10px}
.btn-outline:hover{border-color:var(--accent);color:var(--accent2)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text2);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ===== WAITING ===== */
#waiting{display:none;height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#1a1a2e,var(--bg))}
.wait-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:420px;max-width:92vw;text-align:center;animation:fadeUp .5s ease}
.wait-card h2{font-size:20px;margin-bottom:8px}
.wait-card .room-code{font-size:36px;font-weight:700;font-family:'Courier New',monospace;color:var(--accent2);background:var(--bg);padding:16px 24px;border-radius:var(--radius-sm);border:2px dashed var(--accent);margin:20px 0;letter-spacing:4px;user-select:all;cursor:pointer}
.wait-card .room-code:hover{border-color:var(--accent2)}
.wait-card p{color:var(--text2);font-size:14px;line-height:1.6}
.wait-card .copy-hint{font-size:12px;color:var(--text2);margin-top:12px}
.wait-card .loading{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;color:var(--accent2);font-size:14px}
.wait-card .loading .dots span{animation:blink 1.4s infinite both}
.wait-card .loading .dots span:nth-child(2){animation-delay:.2s}
.wait-card .loading .dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* ===== MAIN APP ===== */
#app{display:none;height:100vh;overflow:hidden}
.app-layout{display:grid;grid-template-columns:1fr 340px;grid-template-rows:1fr;height:100vh}
.video-area{display:flex;flex-direction:column;background:#000;position:relative;overflow:hidden}
.video-container{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden}
.video-container video{width:100%;height:100%;object-fit:contain;background:#000}
.video-container iframe{width:100%;height:100%;border:none;background:#000}
.source-tag{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;z-index:5;background:rgba(0,0,0,.7);backdrop-filter:blur(8px)}
.source-tag.youtube{color:#ff0000}
.source-tag.embed{color:var(--accent2)}
.source-tag.file{color:var(--success)}
.video-controls{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-top:1px solid var(--border)}
.play-btn{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.play-btn:hover{background:#6a4ae8}
.progress-bar{flex:1;height:5px;background:var(--surface3);border-radius:3px;cursor:pointer;position:relative}
.progress-bar .filled{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .05s linear}
.progress-bar .thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .15s}
.progress-bar:hover .thumb{opacity:1}
.time-label{font-size:12px;color:var(--text2);white-space:nowrap;min-width:90px;text-align:center}
.volume-group{display:flex;align-items:center;gap:6px}
.volume-group input[type=range]{width:70px;accent-color:var(--accent)}
.mic-btn{width:32px;height:32px;border-radius:50%;background:var(--surface3);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex-shrink:0}
.mic-btn:hover{background:var(--surface2);color:var(--text)}
.mic-btn.active{background:var(--accent);color:#fff}

.video-url-bar{display:flex;gap:8px;padding:8px 16px;background:var(--surface);border-top:1px solid var(--border)}
.video-url-bar input{flex:1;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px}
.video-url-bar input:focus{border-color:var(--accent)}
.btn-load{padding:8px 16px;background:var(--accent);color:#fff;border-radius:6px;font-size:13px;font-weight:600;white-space:nowrap}
.btn-load:hover{background:#6a4ae8}
.btn-file{padding:8px 12px;background:var(--surface3);color:var(--text2);border-radius:6px;font-size:13px;white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center}
.btn-file:hover{background:var(--border);color:var(--text)}

.drop-overlay{position:absolute;inset:0;background:rgba(124,92,252,.15);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;z-index:10;font-size:18px;font-weight:600;color:var(--accent2)}
.drop-overlay.show{display:flex}

.sync-badge{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border-radius:20px;font-size:12px;font-weight:600;z-index:5}
.sync-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-badge.host{color:var(--accent2)}
.sync-badge.follower{color:var(--success)}

/* ===== CHAT PANEL ===== */
.chat-panel{display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border)}
.chat-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-header h3{font-size:15px;font-weight:600}
.chat-header .room-id{font-size:12px;color:var(--text2);background:var(--surface2);padding:3px 8px;border-radius:4px;font-family:monospace}
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;word-wrap:break-word;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.me{align-self:flex-end;background:var(--chat-me);color:#fff;border-bottom-right-radius:4px}
.chat-msg.them{align-self:flex-start;background:var(--chat-them);border-bottom-left-radius:4px}
.chat-msg.system{align-self:center;background:transparent;color:var(--text2);font-size:12px;padding:4px 0;max-width:100%}
.chat-msg .sender{font-size:11px;font-weight:600;color:var(--accent2);margin-bottom:2px}
.chat-msg.me .sender{color:rgba(255,255,255,.7)}
.chat-input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-input-area input{flex:1;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px}
.chat-input-area input:focus{border-color:var(--accent)}
.btn-send{width:38px;height:38px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px}
.btn-send:hover{background:#6a4ae8}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text);z-index:100;animation:toastIn .3s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.hidden{display:none!important}

@media(max-width:768px){
  .app-layout{grid-template-columns:1fr;grid-template-rows:1fr 240px}
  .chat-panel{border-left:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="landing-card">
    <span class="icon">🎬</span>
    <h1>MovieSync</h1>
    <p class="subtitle">Дивіться фільми разом, де б ви не були</p>
    <div class="field">
      <label>Ваше ім'я</label>
      <input id="username" type="text" placeholder="Наприклад: Олексій" maxlength="20">
    </div>
    <button class="btn btn-primary" id="btnCreate">Створити кімнату</button>
    <div class="divider">або</div>
    <button class="btn btn-outline" id="btnJoinShow">Приєднатися до кімнати</button>
    <div id="joinFields" class="hidden" style="margin-top:16px">
      <div class="field">
        <label>Код кімнати від друга</label>
        <input id="joinCode" type="text" placeholder="Наприклад: 123456" maxlength="10" style="font-family:monospace;letter-spacing:2px">
      </div>
      <button class="btn btn-primary" id="btnJoin">Приєднатися</button>
    </div>
  </div>
</div>

<!-- WAITING -->
<div id="waiting">
  <div class="wait-card">
    <h2 id="waitTitle">Кімнату створено!</h2>
    <p>Надайте цей код другу:</p>
    <div class="room-code" id="roomCodeDisplay" title="Натисніть, щоб скопіювати"></div>
    <p class="copy-hint">Натисніть на код, щоб скопіювати</p>
    <div class="loading" id="waitLoading">
      <span>Очікування друга</span>
      <span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="app-layout">
    <div class="video-area">
      <div class="sync-badge host" id="syncBadge"><span class="dot"></span><span id="syncText">Хост</span></div>
      <div class="video-container" id="videoContainer">
        <video id="video" playsinline preload="metadata"></video>
        <iframe id="videoIframe" class="hidden" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        <span id="sourceTag" class="source-tag hidden"></span>
        <div class="drop-overlay" id="dropOverlay">Перетягніть відео сюди</div>
      </div>
      <div class="video-url-bar">
        <input id="videoUrl" type="text" placeholder="URL: mp4, YouTube, або посилання на сторінку">
        <label class="btn-file"><input type="file" accept="video/*" style="display:none" id="fileInput">📂 Файл</label>
        <button class="btn-load" id="btnLoadVideo">Завантажити</button>
      </div>
      <div class="video-controls">
        <button class="play-btn" id="playBtn">▶</button>
        <div class="progress-bar" id="progressBar">
          <div class="filled" id="progressFilled"></div>
          <div class="thumb" id="progressThumb"></div>
        </div>
        <span class="time-label" id="timeLabel">0:00 / 0:00</span>
        <div class="volume-group">
          <button class="mic-btn" id="micBtn" title="Мікрофон">🎤</button>
          <button class="play-btn" id="volBtn" style="width:32px;height:32px;font-size:12px;background:var(--surface3)">🔊</button>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1">
        </div>
      </div>
    </div>
    <div class="chat-panel">
      <div class="chat-header">
        <h3>Чат</h3>
        <span class="room-id" id="roomId"></span>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <input id="chatInput" type="text" placeholder="Повідомлення..." maxlength="500">
        <button class="btn-send" id="btnSendChat">➤</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ===== STATE =====
const S = {
  username: '',
  isHost: false,
  connected: false,
  peer: null,
  conn: null,           // follower: single connection to host
  connections: {},      // host: map of peerId -> connection
  connectionCount: 0,
  micStream: null,
  micActive: false,
  roomCode: '',
  currentVideo: null,   // track current video for new joiners
};

const $ = s => document.querySelector(s);

// ===== ROOM CODE GENERATION =====
function generateRoomCode() {
  // Simple 6-digit number - guaranteed PeerJS compatible
  return String(Math.floor(100000 + Math.random() * 900000));
}

// ===== UTILITY =====
function fmt(s) {
  if (!s || !isFinite(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}
function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// ===== LANDING =====
$('#btnCreate').onclick = () => {
  const name = $('#username').value.trim();
  if (!name) { $('#username').focus(); toast('Введіть ім\'я'); return; }
  S.username = name;
  S.isHost = true;
  S.roomCode = generateRoomCode();
  $('#landing').style.display = 'none';
  $('#waiting').style.display = 'flex';
  $('#roomCodeDisplay').textContent = S.roomCode;
  $('#roomId').textContent = S.roomCode;
  initHost();
};

$('#btnJoinShow').onclick = () => {
  const name = $('#username').value.trim();
  if (!name) { $('#username').focus(); toast('Введіть ім\'я'); return; }
  S.username = name;
  S.isHost = false;
  $('#joinFields').classList.toggle('hidden');
  if (!$('#joinFields').classList.contains('hidden')) $('#joinCode').focus();
};

$('#btnJoin').onclick = () => {
  const code = $('#joinCode').value.trim().replace(/[^0-9]/g, '');
  if (!code || code.length < 4) { toast('Введіть код кімнати'); return; }
  S.roomCode = code;
  S.isHost = false;
  $('#landing').style.display = 'none';
  $('#waiting').style.display = 'flex';
  $('#waitTitle').textContent = 'Приєднання...';
  $('#roomCodeDisplay').textContent = code;
  $('#roomId').textContent = code;
  initFollower();
};

// Copy room code
$('#roomCodeDisplay').onclick = () => {
  navigator.clipboard.writeText(S.roomCode).then(() => {
    toast('Код скопійовано!');
  }).catch(() => {
    toast('Не вдалося скопіювати');
  });
};

// ===== PEER CONNECTION =====
function initHost() {
  S.peer = new Peer(S.roomCode);

  S.peer.on('open', (id) => {
    console.log('Host peer ready:', id);
  });

  S.peer.on('connection', (conn) => {
    console.log('Follower connected:', conn.peer);

    conn.on('open', () => {
      console.log('Connection open with:', conn.peer);
      S.connections[conn.peer] = conn;
      S.connectionCount++;
      updateParticipantCount();
      onConnected();
      appendChat(null, `Учасник приєднався`, 'system');

      // Send current video state to new joiner
      if (S.currentVideo) {
        safeSend(conn, { type: 'load', url: S.currentVideo.url, mode: S.currentVideo.mode });
        if (S.currentVideo.mode === 'native' && !video.paused) {
          setTimeout(() => {
            safeSend(conn, { type: 'play', time: video.currentTime });
          }, 300);
        }
      }

      // Setup data handler
      conn.on('data', (data) => {
        try {
          const msg = JSON.parse(data);
          if (msg.type === 'chat') {
            appendChat(msg.sender, msg.text, 'them');
            broadcastAll(data, conn.peer);
          } else {
            handleSync(msg);
            broadcastAll(data, conn.peer);
          }
        } catch (e) { console.error('Data parse error:', e); }
      });
    });

    conn.on('close', () => {
      delete S.connections[conn.peer];
      S.connectionCount--;
      updateParticipantCount();
      appendChat(null, 'Учасник відключився', 'system');
      toast('Учасник відключився');
    });

    conn.on('error', (err) => {
      console.error('Conn error:', conn.peer, err);
    });
  });

  S.peer.on('error', (err) => {
    console.error('Peer error:', err);
    toast('Помилка: ' + err.type);
  });
}

function initFollower() {
  S.peer = new Peer();

  S.peer.on('open', (id) => {
    console.log('Follower peer ready:', id);
    const conn = S.peer.connect(S.roomCode, { reliable: true, serialization: 'json' });
    S.conn = conn;

    conn.on('open', () => {
      console.log('Connected to host');
      onConnected();

      conn.on('data', (data) => {
        try {
          const msg = JSON.parse(data);
          if (msg.type === 'chat') {
            appendChat(msg.sender, msg.text, 'them');
          } else {
            handleSync(msg);
          }
        } catch (e) { console.error('Data parse error:', e); }
      });
    });

    conn.on('close', () => {
      toast('З\'єднання з хостом розірвано');
    });

    conn.on('error', (err) => {
      console.error('Connection error:', err);
      toast('Помилка з\'єднання');
    });
  });

  S.peer.on('error', (err) => {
    console.error('Peer error:', err);
    toast('Помилка: ' + err.type);
  });
}

// Safe send with retry
function safeSend(conn, obj) {
  const data = JSON.stringify(obj);
  try {
    if (conn.open) conn.send(data);
  } catch (e) {
    console.error('Send failed, retrying...', e);
    setTimeout(() => {
      try { if (conn.open) conn.send(data); } catch {}
    }, 100);
  }
}

// Host: broadcast to all connected peers (optionally excluding one)
function broadcastAll(data, excludePeer) {
  for (const peerId in S.connections) {
    if (peerId === excludePeer) continue;
    const conn = S.connections[peerId];
    try {
      if (conn.open) conn.send(data);
    } catch (e) { console.error('Broadcast error:', e); }
  }
}

function updateParticipantCount() {
  const count = S.connectionCount;
  if (count > 0) {
    $('#syncText').textContent = `Хост (${count} учасник${count > 1 ? (count < 5 ? 'и' : 'ів') : ''})`;
  } else {
    $('#syncText').textContent = 'Хост';
  }
}

function sendSync(msg) {
  if (S.isHost) {
    broadcastAll(JSON.stringify(msg));
  } else if (S.conn && S.conn.open) {
    safeSend(S.conn, msg);
  }
}

function sendChat(text) {
  const msg = { type: 'chat', sender: S.username, text };
  if (S.isHost) {
    broadcastAll(JSON.stringify(msg));
  } else if (S.conn && S.conn.open) {
    safeSend(S.conn, msg);
  }
  appendChat(S.username, text, 'me');
}

// ===== SYNC HANDLER =====
function handleSync(msg) {
  const v = $('#video');
  switch (msg.type) {
    case 'load':
      loadVideo(msg.url, false);
      break;
    case 'play':
      if (currentMode === 'native') {
        if (msg.time != null) v.currentTime = msg.time;
        v.play().catch(() => {});
      } else if (currentMode === 'youtube') {
        iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'playVideo', args: [] }), '*');
      }
      break;
    case 'pause':
      if (currentMode === 'native') {
        if (msg.time != null) v.currentTime = msg.time;
        v.pause();
      } else if (currentMode === 'youtube') {
        iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'pauseVideo', args: [] }), '*');
      }
      break;
    case 'seek':
      if (currentMode === 'native' && msg.time != null) {
        v.currentTime = msg.time;
      } else if (currentMode === 'youtube' && msg.time != null) {
        iframe.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'seekTo', args: [msg.time, true] }), '*');
      }
      break;
  }
}

// ===== CONNECTION ESTABLISHED =====
function onConnected() {
  if (S.connected) return;
  S.connected = true;
  $('#waiting').style.display = 'none';
  $('#app').style.display = 'block';
  const role = S.isHost ? 'host' : 'follower';
  $('#syncBadge').className = `sync-badge ${role}`;
  $('#syncText').textContent = S.isHost ? 'Хост' : 'Учасник';
  appendChat(null, `${S.username} приєднався`, 'system');
  toast('З\'єднання встановлено!');
}

// ===== VIDEO CONTROLS =====
const video = $('#video');
const iframe = $('#videoIframe');
const sourceTag = $('#sourceTag');
let userDragging = false;
let currentMode = '';

function detectSourceType(url) {
  if (!url) return null;
  const ytMatch = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (ytMatch) return { type: 'youtube', id: ytMatch[1] };
  if (/\.(mp4|webm|ogg|mov)(\?|$)/i.test(url)) return { type: 'native', url };
  return { type: 'iframe', url };
}

function loadVideo(url, broadcast = true) {
  if (!url) return;
  const src = detectSourceType(url);

  if (!src) { toast('Не вдалося визначити тип джерела'); return; }

  video.classList.add('hidden');
  iframe.classList.add('hidden');
  sourceTag.classList.add('hidden');
  video.src = '';
  iframe.src = '';

  if (src.type === 'native') {
    currentMode = 'native';
    video.classList.remove('hidden');
    sourceTag.classList.remove('hidden');
    sourceTag.className = 'source-tag file';
    sourceTag.textContent = 'MP4';
    video.src = src.url;
    video.load();
    $('.video-controls').style.display = 'flex';
    $('.video-url-bar').style.display = 'flex';
  } else if (src.type === 'youtube') {
    currentMode = 'youtube';
    iframe.classList.remove('hidden');
    sourceTag.classList.remove('hidden');
    sourceTag.className = 'source-tag youtube';
    sourceTag.textContent = 'YouTube';
    iframe.src = `https://www.youtube.com/embed/${src.id}?enablejsapi=1&rel=0`;
    $('.video-controls').style.display = 'none';
    $('.video-url-bar').style.display = 'flex';
  } else if (src.type === 'iframe') {
    currentMode = 'iframe';
    iframe.classList.remove('hidden');
    sourceTag.classList.remove('hidden');
    sourceTag.className = 'source-tag embed';
    sourceTag.textContent = 'Embed';
    iframe.src = src.url;
    iframe.onload = () => { toast('Сторінка завантажена'); };
    iframe.onerror = () => { toast('Сторінка заблокувала вставку (X-Frame-Options)'); };
    $('.video-controls').style.display = 'none';
    $('.video-url-bar').style.display = 'flex';
  }

  if (broadcast) {
    S.currentVideo = { url, mode: currentMode };
    sendSync({ type: 'load', url, mode: currentMode });
  }
}

$('#btnLoadVideo').onclick = () => { loadVideo($('#videoUrl').value.trim()); };
$('#videoUrl').onkeydown = (e) => { if (e.key === 'Enter') loadVideo($('#videoUrl').value.trim()); };

// File input
$('#fileInput').onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const url = URL.createObjectURL(file);
    loadVideo(url);
    $('#videoUrl').value = file.name;
  }
};

// Drag & drop
const vc = $('#videoContainer');
const dropOverlay = $('#dropOverlay');
['dragenter', 'dragover'].forEach(ev => vc.addEventListener(ev, e => { e.preventDefault(); dropOverlay.classList.add('show'); }));
['dragleave', 'drop'].forEach(ev => vc.addEventListener(ev, e => { e.preventDefault(); dropOverlay.classList.remove('show'); }));
vc.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) {
    loadVideo(URL.createObjectURL(file));
    $('#videoUrl').value = file.name;
  }
});

// Play / Pause
$('#playBtn').onclick = togglePlay;
video.onclick = togglePlay;

function togglePlay() {
  if (currentMode !== 'native') return;
  if (video.paused) {
    video.play().catch(() => {});
    sendSync({ type: 'play', time: video.currentTime });
  } else {
    video.pause();
    sendSync({ type: 'pause', time: video.currentTime });
  }
}

video.onplay = () => { $('#playBtn').textContent = '⏸'; };
video.onpause = () => { $('#playBtn').textContent = '▶'; };

// Progress
$('#progressBar').addEventListener('mousedown', e => { userDragging = true; seekFrom(e); });
document.addEventListener('mousemove', e => { if (userDragging) seekFrom(e); });
document.addEventListener('mouseup', () => { userDragging = false; });

function seekFrom(e) {
  if (currentMode !== 'native') return;
  const bar = $('#progressBar');
  const rect = bar.getBoundingClientRect();
  let pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  if (video.duration) {
    video.currentTime = pct * video.duration;
    sendSync({ type: 'seek', time: video.currentTime });
  }
}

video.ontimeupdate = () => {
  if (currentMode === 'native' && !userDragging && video.duration) {
    const pct = (video.currentTime / video.duration) * 100;
    $('#progressFilled').style.width = pct + '%';
    $('#progressThumb').style.left = pct + '%';
    $('#timeLabel').textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
  }
};

// Volume
$('#volumeSlider').oninput = () => { video.volume = $('#volumeSlider').value; updateVolIcon(); };
$('#volBtn').onclick = () => { video.muted = !video.muted; updateVolIcon(); };
function updateVolIcon() {
  $('#volBtn').textContent = video.muted || video.volume === 0 ? '🔇' : video.volume < 0.5 ? '🔉' : '🔊';
}

// Microphone
$('#micBtn').onclick = async () => {
  if (S.micActive) {
    if (S.micStream) { S.micStream.getTracks().forEach(t => t.stop()); S.micStream = null; }
    S.micActive = false;
    $('#micBtn').classList.remove('active');
    toast('Мікрофон вимкнено');
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      S.micStream = stream;
      S.micActive = true;
      $('#micBtn').classList.add('active');
      // Add audio track to peer connection if available
      if (S.peer && S.peer._pc) {
        stream.getTracks().forEach(track => S.peer._pc.addTrack(track, stream));
      }
      toast('Мікрофон увімкнено');
    } catch {
      toast('Не вдалося увімкнути мікрофон');
    }
  }
};

// ===== CHAT =====
function appendChat(sender, text, who) {
  const container = $('#chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${who}`;
  if (who === 'system') {
    div.textContent = text;
  } else {
    div.innerHTML = `<div class="sender">${escapeHtml(sender)}</div><div>${escapeHtml(text)}</div>`;
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

$('#btnSendChat').onclick = sendFromInput;
$('#chatInput').onkeydown = e => { if (e.key === 'Enter') sendFromInput(); };

function sendFromInput() {
  const input = $('#chatInput');
  const text = input.value.trim();
  if (!text) return;
  sendChat(text);
  input.value = '';
  input.focus();
}
</script>
</body>
</html>
